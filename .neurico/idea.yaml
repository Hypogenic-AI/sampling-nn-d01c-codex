idea:
  title: Sampling Neural Network
  domain: machine_learning
  hypothesis: 'Sampling from the distribution of activations at an intermediate neural
    network layer, in the same way as sampling from the final softmax layer, will
    affect the network''s behavior in novel ways compared to standard deterministic
    or stochastic approaches.

    '
  background:
    description: 'What if we made a neural network where we take the distribution
      of activations on an intermediate layer and sample from it, the way we do in
      the final softmax layer? What would that do that everything?

      This isn''t Peter West''s idea.

      '
